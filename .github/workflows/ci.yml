name: CI

# Fast, token-free checks that need no opencode auth and call no model: shell
# syntax, ShellCheck, the fake-opencode wrapper unit tests, and command/agent
# frontmatter and documentation validation. The agent permission runtime proofs
# are intentionally not here because they need a real authenticated opencode.
#
# Two jobs: `shell` on Linux, and `macos` running the same opencode-free set
# against BSD awk/sed/mktemp and stock bash 3.2. The macOS job is free only
# because this repo is public (private repos bill macOS minutes at 10x), which
# is why it landed at release rather than earlier.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    name: shell checks + wrapper tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Enumerate shell scripts
        id: scripts
        run: |
          # All tracked *.sh plus the extension-less fake-opencode stub.
          files="$(git ls-files '*.sh' 'collab/tests/fake-opencode')"
          echo "Files to check:"; echo "$files"
          # shellcheck disable=SC2086
          printf '%s\n' $files > /tmp/shfiles
          echo "list=/tmp/shfiles" >> "$GITHUB_OUTPUT"

      - name: Syntax check (bash -n)
        run: |
          rc=0
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            bash -n "$f" && echo "syntax ok: $f" || { echo "SYNTAX FAIL: $f"; rc=1; }
          done < /tmp/shfiles
          exit "$rc"

      - name: ShellCheck (severity=warning)
        # Single source of truth: the same script a dev runs locally and doctor --full
        # calls, so the file set + flags can't drift between local and CI. It skips
        # cleanly if shellcheck is absent — the Install step above guarantees it here.
        run: bash collab/tests/check-shellcheck.sh

      - name: Shebang conformance (#!/usr/bin/env bash everywhere)
        run: bash collab/tests/check-shebangs.sh

      - name: Frontmatter validation
        run: bash collab/tests/check-frontmatter.sh

      - name: Documentation workflow lint
        run: bash collab/tests/check-docs.sh --self-test

      - name: Host-config symlink confinement
        run: bash .devcontainer/test-prepare-host-config.sh

      - name: Agent permission invariants (source-level allowlist lint)
        # Opencode-free: guards the realistic regression (a human weakens an agent
        # def — re-adds "*": allow, drops the deny floor, flips mode). It does NOT
        # prove opencode's resolved enforcement — that's verify-collab-*.sh, which
        # needs the opencode binary and runs locally / via doctor.sh, not here.
        run: bash collab/tests/check-agent-permissions.sh

      - name: Wrapper unit tests (fake opencode, no model calls)
        run: bash collab/tests/run-tests.sh

      - name: Installer smoke tests (install/uninstall into temp dirs)
        run: bash collab/tests/test-install.sh

  macos:
    name: macOS / BSD (stock bash 3.2)
    runs-on: macos-latest
    # Same token-free, opencode-free checks as the Linux job, run against BSD
    # awk/sed/mktemp and stock bash 3.2 — the platform difference no lint can
    # catch. ShellCheck is deliberately NOT repeated here: it is static analysis
    # with identical results on either OS, so it would cost a brew install to
    # prove nothing.
    steps:
      - uses: actions/checkout@v4

      # THE TRAP THIS JOB EXISTS TO AVOID (see PLAN.md, Phase 1 portability):
      # GitHub's macOS images ship a Homebrew bash 5 ahead of the stock /bin/bash
      # 3.2 on PATH. Our shebangs are `#!/usr/bin/env bash`, so without this the
      # whole suite would silently run on bash 5 and mask the exact 3.2 bugs the
      # job is here to find — a green check proving nothing.
      #
      # Shadowing `bash` on PATH (rather than invoking /bin/bash per step) is what
      # makes this total: it also covers `#!/usr/bin/env bash` shebangs and the
      # nested `bash foo.sh` calls the test scripts make internally.
      - name: Pin stock bash 3.2 onto PATH
        run: |
          mkdir -p /tmp/stockbash
          ln -sf /bin/bash /tmp/stockbash/bash
          echo "/tmp/stockbash" >> "$GITHUB_PATH"

      - name: Verify the pin took (fail loudly if this is not bash 3.x)
        run: |
          echo "which bash : $(command -v bash)"
          bash --version | head -1
          # If Apple ever ships a newer stock bash, this job stops testing what it
          # was created to test. That must be loud, not a silent pass: the whole
          # point is coverage of 3.2, which the Linux job cannot provide.
          major="$(bash -c 'echo "${BASH_VERSINFO[0]}"')"
          if [ "$major" != "3" ]; then
            echo "::error::Expected stock bash 3.x, got ${major}.x — this job is no longer testing bash 3.2. Re-point the pin or retire the job deliberately."
            exit 1
          fi

      # gtimeout only. The test fixtures use it as a safety net so a hang fails the
      # run instead of wedging it, and without it five delegate cases (FIFO, device,
      # unreadable, large-directory) report INCONCLUSIVE and cover nothing on the
      # one platform they most need to cover — BSD find/awk is what they exercise.
      #
      # coreutils installs g-prefixed binaries ONLY. It does NOT shadow BSD awk or
      # sed, so the platform difference under test is preserved. Do not add gawk or
      # gnu-sed here: that would quietly turn this job back into a second Linux run.
      - name: Install coreutils (gtimeout for the test fixtures)
        run: brew install coreutils

      - name: Syntax check (bash -n)
        run: |
          rc=0
          for f in $(git ls-files '*.sh' 'collab/tests/fake-opencode'); do
            bash -n "$f" && echo "syntax ok: $f" || { echo "SYNTAX FAIL: $f"; rc=1; }
          done
          exit "$rc"

      - name: Shebang conformance
        run: bash collab/tests/check-shebangs.sh

      - name: Frontmatter validation
        run: bash collab/tests/check-frontmatter.sh

      - name: Documentation workflow lint
        run: bash collab/tests/check-docs.sh --self-test

      - name: Host-config symlink confinement
        # Genuinely macOS-relevant: prepare-host-config.sh runs on the HOST, so a
        # Mac user runs this code path for real.
        run: bash .devcontainer/test-prepare-host-config.sh

      - name: Agent permission invariants (source-level allowlist lint)
        # High value here: its effective-permission resolver is awk, and this is
        # the only place that awk meets BSD awk.
        run: bash collab/tests/check-agent-permissions.sh

      - name: Wrapper unit tests (fake opencode, no model calls)
        run: bash collab/tests/run-tests.sh

      - name: Installer smoke tests (install/uninstall into temp dirs)
        # The highest-risk surface on BSD: newest code, heavy awk, and it edits
        # users' .gitignore and deletes files.
        run: bash collab/tests/test-install.sh
